CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_IDLE_TIMEOUT=3600000

CONFIG_ZMK_KEYBOARD_NAME="Corne" 

# Linux/BlueZ sometimes fails BLE auth with ZMK unless experimental
# connection/security handling is enabled.
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
